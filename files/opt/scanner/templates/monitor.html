<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Monitor — Scanner</title>
<style>
  :root {
    --bg-deep:          #0a0a0c;
    --bg-panel:         #15161a;
    --bg-raise:         #1f2126;
    --bg-button:        #2a2d33;
    --bg-button-hover:  #353941;
    --line:             #2c2e34;
    --amber:            #ffae3a;
    --amber-dim:        #6b4818;
    --green:            #6df09b;
    --red:              #f06d6d;
    --text:             #e6e6e6;
    --text-dim:         #888;
    --text-faint:       #555;
    --accent:           #2563eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: radial-gradient(circle at 50% -20%, #1a1c22 0%, var(--bg-deep) 70%);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
  }

  /* ── Nav header (matches other scanner pages) ── */
  header {
    background: #1a1d27;
    border-bottom: 1px solid #2d3148;
    padding: 12px 20px;
    display: flex; align-items: center; gap: 24px;
  }
  header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.05em; color: #a5b4fc; }
  nav a { font-size: 0.85rem; color: #94a3b8; text-decoration: none; }
  nav a.active { color: #e2e8f0; }

  /* ── Tuner widget ── */
  .wrap {
    display: flex; justify-content: center; align-items: flex-start;
    padding: 2rem 1rem 3rem;
  }
  .tuner {
    width: 100%; max-width: 540px;
    background: linear-gradient(180deg, #1a1c22 0%, var(--bg-panel) 100%);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.04);
    padding: 1.25rem;
    display: flex; flex-direction: column; gap: 1rem;
  }

  /* ── LCD ── */
  .lcd {
    background: linear-gradient(180deg, #0d0e10 0%, #16181c 100%);
    border: 1px solid #000;
    border-radius: 10px;
    padding: 1rem 1.25rem;
    box-shadow: inset 0 2px 8px rgba(0,0,0,.7);
    min-height: 120px;
  }
  .lcd-row { display: flex; justify-content: space-between; align-items: baseline; }
  .lcd-band {
    color: var(--amber);
    font-family: 'Courier New', monospace;
    font-size: .85rem; font-weight: 700; letter-spacing: .12em;
    text-shadow: 0 0 8px var(--amber);
  }
  .lcd-status {
    display: flex; gap: .65rem; align-items: center;
    font-size: .7rem; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: .1em;
  }
  .led {
    width: 7px; height: 7px; border-radius: 50%;
    background: #333;
    transition: background .15s, box-shadow .15s;
    display: inline-block;
  }
  .led.on  { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .led.amber { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  .led.err { background: var(--red);   box-shadow: 0 0 8px var(--red); }
  .lcd-freq {
    color: var(--amber);
    font-family: 'Courier New', monospace;
    font-weight: 700; font-size: 3.2rem; letter-spacing: .04em; line-height: 1;
    margin: .45rem 0 .2rem;
    text-shadow: 0 0 12px rgba(255,174,58,.6);
    font-variant-numeric: tabular-nums;
  }
  .lcd-freq .unit { font-size: 1rem; color: var(--amber-dim); margin-left: .35rem; letter-spacing: .15em; vertical-align: middle; }
  .lcd-call { color: var(--text); font-size: 1rem; font-weight: 500; min-height: 1.4em; }
  .lcd-call .sub { color: var(--text-dim); font-weight: 400; font-size: .82rem; }

  /* ── Presets ── */
  .presets-label {
    font-size: .65rem; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: .15em;
    margin-bottom: .4rem; padding-left: .25rem;
  }
  .presets { display: grid; grid-template-columns: repeat(2, 1fr); gap: .5rem; }
  .preset {
    background: var(--bg-button);
    border: 1px solid transparent;
    border-radius: 8px; padding: .7rem .5rem;
    cursor: pointer; text-align: center;
    transition: all .12s;
  }
  .preset:hover { background: var(--bg-button-hover); }
  .preset.active { border-color: var(--amber); background: #2c2520; }
  .preset .plabel { display: block; font-size: .9rem; font-weight: 600; color: var(--text); }
  .preset .pdesc  { display: block; margin-top: .2rem; font-size: .7rem; color: var(--text-dim); font-family: 'Courier New', monospace; }

  /* ── Controls ── */
  .controls {
    display: flex; align-items: center; gap: .5rem; justify-content: space-between;
  }
  .ctrl-left { display: flex; gap: .4rem; }
  .ctrl-right { display: flex; align-items: center; gap: .5rem; }
  .btn {
    background: var(--bg-button); border: 1px solid var(--line);
    border-radius: 8px; color: var(--text);
    padding: .6rem .85rem; font-size: .85rem; font-weight: 500;
    cursor: pointer; transition: all .12s;
    display: inline-flex; align-items: center; justify-content: center; gap: .35rem;
    min-width: 44px; min-height: 40px;
  }
  .btn:hover:not(:disabled) { background: var(--bg-button-hover); }
  .btn:disabled { opacity: .35; cursor: not-allowed; }
  .btn.primary { background: var(--accent); border-color: var(--accent); }
  .btn.primary:hover:not(:disabled) { filter: brightness(1.1); }
  .btn.danger  { background: #3a2424; border-color: #5a3434; color: #f06d6d; }
  .btn.danger:hover:not(:disabled)  { background: #4a2c2c; }

  /* Volume */
  .vol-wrap { display: flex; align-items: center; gap: .4rem; }
  .vol-icon { font-size: 1rem; color: var(--text-dim); }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 110px; height: 6px;
    background: var(--bg-raise); border-radius: 3px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px;
    background: var(--amber); border-radius: 50%; cursor: pointer;
    box-shadow: 0 0 4px rgba(255,174,58,.5);
  }
  input[type=range]::-moz-range-thumb {
    width: 18px; height: 18px;
    background: var(--amber); border-radius: 50%; cursor: pointer; border: 0;
  }

  /* Squelch */
  .sq-row {
    display: flex; align-items: center; gap: .6rem; padding: 0 .25rem;
  }
  .sq-label {
    font-size: .65rem; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: .12em; min-width: 1.6rem;
  }
  .sq-val {
    font-size: .78rem; color: var(--amber);
    font-family: 'Courier New', monospace; min-width: 2.8rem;
  }
  .sq-hint {
    font-size: .65rem; color: var(--text-faint); margin-left: auto;
  }

  /* Status bar */
  .status-bar {
    font-size: .75rem; color: var(--text-dim); min-height: 1.2em;
    padding: 0 .25rem;
  }

  /* Direct tune modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center;
    padding: 1rem; z-index: 100;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--bg-panel); border: 1px solid var(--line);
    border-radius: 14px; padding: 1.1rem;
    width: 100%; max-width: 340px;
    display: flex; flex-direction: column; gap: .75rem;
  }
  .modal h3 { font-size: 1rem; color: var(--text); }
  .modal label { font-size: .8rem; color: var(--text-dim); display: block; margin-bottom: .25rem; }
  .modal select, .modal input[type=text], .modal input[type=number] {
    width: 100%; padding: .5rem .65rem;
    background: var(--bg-raise); border: 1px solid var(--line);
    border-radius: 6px; color: var(--text); font-size: .9rem;
    font-family: 'Courier New', monospace;
    outline: none; -moz-appearance: textfield;
  }
  .modal input:focus, .modal select:focus { border-color: var(--amber); }
  .modal input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .modal-row { display: flex; gap: .5rem; }
  .modal-row .btn { flex: 1; }

  /* Toast */
  .toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    background: var(--bg-button); color: var(--text);
    padding: .6rem 1rem; border-radius: 6px; border: 1px solid var(--line);
    font-size: .85rem; opacity: 0; transition: opacity .25s;
    pointer-events: none; z-index: 200;
  }
  .toast.show { opacity: 1; }

  /* Footer */
  .footer { text-align: center; font-size: .7rem; color: var(--text-faint); }
  .footer a { color: var(--text-dim); text-decoration: none; }

  @media (max-width: 400px) {
    .lcd-freq { font-size: 2.4rem; }
    input[type=range] { width: 80px; }
  }
</style>
</head>
<body>

<header>
  <h1>Scanner</h1>
  <nav>
    <a href="/">Dashboard</a> &nbsp;
    <a href="/listen">Listen</a> &nbsp;
    <a href="/calls">Calls</a> &nbsp;
    <a href="/recordings">Recordings</a> &nbsp;
    <a href="/monitor" class="active">Monitor</a>
  </nav>
</header>

<div class="wrap">
<div class="tuner">

  <!-- LCD -->
  <div class="lcd">
    <div class="lcd-row">
      <div class="lcd-band" id="band-display">—</div>
      <div class="lcd-status">
        <span class="led" id="stream-led"></span> STREAM
      </div>
    </div>
    <div class="lcd-freq" id="freq-display">---.---<span class="unit">MHz</span></div>
    <div class="lcd-call" id="call-display">Select a preset or tune manually</div>
  </div>

  <!-- Presets -->
  <div>
    <div class="presets-label">Presets — click to tune</div>
    <div class="presets" id="presets"></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="ctrl-left">
      <button class="btn danger" id="stop-btn" disabled>■ Stop</button>
      <button class="btn" id="tune-btn" title="Direct tune">⌨ Tune</button>
    </div>
    <div class="ctrl-right">
      <button class="btn primary" id="play-btn">▶</button>
      <div class="vol-wrap">
        <span class="vol-icon" id="vol-icon">🔊</span>
        <input type="range" id="vol" min="0" max="100" value="80">
      </div>
    </div>
  </div>

  <!-- Squelch -->
  <div class="sq-row">
    <span class="sq-label">SQ</span>
    <input type="range" id="sq" min="0" max="150" value="0" style="width:120px">
    <span class="sq-val" id="sq-val">OFF</span>
    <span class="sq-hint">re-tune to apply</span>
  </div>

  <!-- Status line -->
  <div class="status-bar" id="status-bar"></div>

  <div id="caption" style="display:none;margin-top:10px;padding:10px 14px;
       background:#11151f;border:1px solid #2d3148;border-radius:8px;
       color:#cbd5e1;font-style:italic;line-height:1.4;min-height:1.2em">
    <span id="caption-label" style="font-style:normal;font-size:0.65rem;
          text-transform:uppercase;letter-spacing:0.06em;color:#64748b;margin-right:8px">caption</span>
    <span id="caption-text"></span>
  </div>

  <div class="footer"><a href="/transcript">transcript log</a> · <a href="/">dashboard</a></div>

</div><!-- .tuner -->
</div><!-- .wrap -->

<audio id="audio" preload="none"></audio>

<!-- Direct tune modal -->
<div class="modal-bg" id="tune-modal">
  <div class="modal">
    <h3>Direct Tune</h3>
    <div>
      <label>Frequency (e.g. 162.550M or 119.700M)</label>
      <input type="text" id="dt-freq" placeholder="162.550M" autocomplete="off">
    </div>
    <div>
      <label>Mode</label>
      <select id="dt-mode">
        <option value="fm">FM (narrowband)</option>
        <option value="am">AM</option>
        <option value="wbfm">Wide FM</option>
        <option value="usb">USB</option>
        <option value="lsb">LSB</option>
      </select>
    </div>
    <div>
      <label>Gain (0–60, default 20)</label>
      <input type="number" id="dt-gain" value="20" min="0" max="60">
    </div>
    <div class="modal-row">
      <button class="btn primary" id="dt-go">Tune</button>
      <button class="btn" id="dt-cancel">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

const STREAM_URL = {{ stream_url|tojson }};
const LS_VOL     = 'scanner-monitor.vol';
const LS_PRESET  = 'scanner-monitor.preset';
const LS_SQ      = 'scanner-monitor.sq';

const PRESETS = [
  { id: 1, label: "NOAA WX",    freq: "162.550M", mode: "fm", gain: 20, desc: "162.550 MHz · NFM" },
  { id: 2, label: "Marine 16",  freq: "156.800M", mode: "fm", gain: 20, desc: "156.800 MHz · CH16" },
  { id: 3, label: "CCPA EMS",   freq: "155.205M", mode: "fm", gain: 20, desc: "155.205 MHz · NFM" },
  { id: 4, label: "KCGI Tower", freq: "119.700M", mode: "am", gain: 20, desc: "119.700 MHz · AM"  },
];

const $ = id => document.getElementById(id);
const audio = $('audio');

let activePreset = null;   // id of the preset currently tuned
let isPlaying    = false;
let tuning       = false;  // waiting for job to start

// ---------------------------------------------------------------------------
// Presets
// ---------------------------------------------------------------------------
function renderPresets() {
  const grid = $('presets');
  grid.innerHTML = '';
  PRESETS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'preset' + (activePreset === p.id ? ' active' : '');
    btn.innerHTML = `<span class="plabel">${p.label}</span><span class="pdesc">${p.desc}</span>`;
    btn.addEventListener('click', () => tunePreset(p));
    grid.appendChild(btn);
  });
}

// ---------------------------------------------------------------------------
// Tune
// ---------------------------------------------------------------------------
async function tunePreset(p) {
  await tune(p.freq, p.mode, p.gain, p.label, p.id);
}

async function tune(freq, mode, gain, label, presetId = null) {
  if (tuning) return;
  tuning = true;
  setStatus(`Tuning ${freq} ${mode.toUpperCase()}…`);
  setStreamLed('amber');
  if (isPlaying) pauseAudio();

  try {
    const squelch = parseInt($('sq').value) || 0;
    const r = await fetch('/api/monitor/tune', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ freq, mode, gain, label, duration_s: 3600, squelch }),
    });
    const j = await r.json();
    if (j.error) throw new Error(j.error);

    activePreset = presetId;
    updateLcd(freq, mode, label);
    renderPresets();
    $('stop-btn').disabled = false;

    setStatus('Waiting for stream…');
    await waitForMonitor(freq);
    setStatus('');
    setStreamLed('on');
    playAudio();

  } catch (e) {
    setStreamLed('err');
    setStatus('Error: ' + e.message);
    showToast('Tune failed: ' + e.message);
  } finally {
    tuning = false;
  }
}

async function waitForMonitor(expectedFreq, maxMs = 20000, pollMs = 600) {
  const deadline = Date.now() + maxMs;
  while (Date.now() < deadline) {
    await new Promise(r => setTimeout(r, pollMs));
    try {
      const d = await (await fetch('/api/status')).json();
      const cur = d.current;
      if (cur && cur.name === 'monitor' && cur.detail && cur.detail.includes(expectedFreq)) {
        // Give Icecast ~3s to buffer
        await new Promise(r => setTimeout(r, 3000));
        return;
      }
    } catch (e) {}
  }
}

// ---------------------------------------------------------------------------
// Stop
// ---------------------------------------------------------------------------
async function stop() {
  pauseAudio();
  setStreamLed('');
  try {
    await fetch('/api/monitor/stop', { method: 'POST' });
  } catch (e) {}
  activePreset = null;
  $('stop-btn').disabled = true;
  updateLcd(null, null, null);
  renderPresets();
  setStatus('Stopped.');
  setTimeout(() => setStatus(''), 2000);
}

// ---------------------------------------------------------------------------
// Audio playback
// ---------------------------------------------------------------------------
function playAudio() {
  if (!STREAM_URL) { showToast('MONITOR_STREAM_URL not configured'); return; }
  const sep = STREAM_URL.includes('?') ? '&' : '?';
  audio.src = STREAM_URL + sep + 't=' + Date.now();
  audio.volume = $('vol').value / 100;
  const p = audio.play();
  if (p && p.catch) p.catch(err => {
    isPlaying = false;
    $('play-btn').textContent = '▶';
    setStreamLed('err');
    showToast('Play failed: ' + err.message);
  });
  isPlaying = true;
  $('play-btn').textContent = '⏸';
}

function pauseAudio() {
  audio.pause(); audio.src = '';
  isPlaying = false;
  $('play-btn').textContent = '▶';
}

// ---------------------------------------------------------------------------
// LCD helpers
// ---------------------------------------------------------------------------
function updateLcd(freq, mode, label) {
  if (!freq) {
    $('band-display').textContent = '—';
    $('freq-display').innerHTML = '---.---<span class="unit">MHz</span>';
    $('call-display').textContent = 'Select a preset or tune manually';
    return;
  }
  const modeLabel = mode === 'wbfm' ? 'WFM'
                  : mode === 'am'   ? 'AM'
                  : mode === 'usb'  ? 'USB'
                  : mode === 'lsb'  ? 'LSB'
                  : 'NFM';
  $('band-display').textContent = modeLabel;
  const num = freq.replace(/[kMG]$/, '');
  const unit = freq.endsWith('k') ? 'kHz' : 'MHz';
  $('freq-display').innerHTML = `${parseFloat(num).toFixed(3)}<span class="unit">${unit}</span>`;
  $('call-display').innerHTML = label
    ? `${label} <span class="sub">· ${freq}</span>`
    : `<span class="sub">${freq}</span>`;
}

function setStreamLed(state) {
  const led = $('stream-led');
  led.classList.remove('on', 'amber', 'err');
  if (state) led.classList.add(state);
}

function setStatus(msg) {
  $('status-bar').textContent = msg;
}

// ---------------------------------------------------------------------------
// Poll scheduler status to detect external preemptions
// ---------------------------------------------------------------------------
async function pollStatus() {
  if (tuning) return;
  try {
    const d = await (await fetch('/api/status')).json();
    const isMonitor = d.current && d.current.name === 'monitor';
    if (!isMonitor && activePreset !== null) {
      // Our job was preempted (e.g. EMS/MOSWIN or a manual tune)
      activePreset = null;
      pauseAudio();
      setStreamLed('');
      $('stop-btn').disabled = true;
      renderPresets();
      const reason = d.current ? d.current.name : 'unknown';
      setStatus(`Preempted by ${reason}`);
      showToast(`Monitor preempted by ${reason}`);
    }
  } catch (e) {}
}

// ---------------------------------------------------------------------------
// Direct tune modal
// ---------------------------------------------------------------------------
function openTuneModal() {
  $('tune-modal').classList.add('show');
  setTimeout(() => $('dt-freq').focus(), 60);
}

function closeTuneModal() {
  $('tune-modal').classList.remove('show');
}

async function commitDirectTune() {
  const freq = $('dt-freq').value.trim();
  if (!freq) { showToast('Enter a frequency'); return; }
  const mode = $('dt-mode').value;
  const gain = parseInt($('dt-gain').value) || 20;
  closeTuneModal();
  await tune(freq, mode, gain, freq, null);
}

// ---------------------------------------------------------------------------
// Toast
// ---------------------------------------------------------------------------
let toastTimer;
function showToast(msg) {
  const t = $('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ---------------------------------------------------------------------------
// Event wiring
// ---------------------------------------------------------------------------
$('play-btn').addEventListener('click', () => {
  if (isPlaying) pauseAudio(); else playAudio();
});
$('stop-btn').addEventListener('click', stop);
$('tune-btn').addEventListener('click', openTuneModal);
$('dt-go').addEventListener('click', commitDirectTune);
$('dt-cancel').addEventListener('click', closeTuneModal);
$('dt-freq').addEventListener('keydown', e => {
  if (e.key === 'Enter') commitDirectTune();
  if (e.key === 'Escape') closeTuneModal();
});
$('tune-modal').addEventListener('click', e => {
  if (e.target.id === 'tune-modal') closeTuneModal();
});

$('vol').addEventListener('input', e => {
  audio.volume = e.target.value / 100;
  localStorage.setItem(LS_VOL, e.target.value);
  $('vol-icon').textContent = e.target.value == 0 ? '🔇'
                            : e.target.value < 33  ? '🔈'
                            : e.target.value < 66  ? '🔉' : '🔊';
});
$('sq').addEventListener('input', e => {
  const v = parseInt(e.target.value);
  $('sq-val').textContent = v === 0 ? 'OFF' : v;
  localStorage.setItem(LS_SQ, v);
});

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
const savedVol = localStorage.getItem(LS_VOL);
if (savedVol != null) {
  $('vol').value = savedVol;
  $('vol').dispatchEvent(new Event('input'));
}
const savedSq = localStorage.getItem(LS_SQ);
if (savedSq != null) {
  $('sq').value = savedSq;
  $('sq').dispatchEvent(new Event('input'));
}

renderPresets();

// Sync with live scheduler state on load
(async () => {
  try {
    const d = await (await fetch('/api/status')).json();
    if (d.current && d.current.name === 'monitor') {
      // Already tuned — reflect that in the UI
      const detail = d.current.detail || '';
      // detail is like "162.550M FM — NOAA WX"
      const parts = detail.split(' — ');
      const freqMode = parts[0].split(' ');
      const label = parts[1] || '';
      updateLcd(freqMode[0] || '', (freqMode[1] || '').toLowerCase(), label);
      $('band-display').textContent = (freqMode[1] || '').toUpperCase();
      $('stop-btn').disabled = false;
      setStreamLed('on');
      const p = PRESETS.find(p => detail.includes(p.label));
      if (p) activePreset = p.id;
      renderPresets();
    }
  } catch (e) {}
})();

setInterval(pollStatus, 3000);

// Live caption overlay — latest Whisper caption while fresh.
async function pollCaption() {
  try {
    const c = await (await fetch('/api/transcribe')).json();
    const box = document.getElementById('caption');
    const fresh = c.text && (Date.now()/1000 - (c.updated || 0) < 30);
    if (fresh) {
      document.getElementById('caption-label').textContent = c.context || 'caption';
      document.getElementById('caption-text').textContent = c.text;
      box.style.display = 'block';
    } else {
      box.style.display = 'none';
    }
  } catch (e) {}
}
setInterval(pollCaption, 3000);
pollCaption();
